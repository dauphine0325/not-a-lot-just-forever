<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Rio ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#ffe5ee,#ffd6e7);
    font-family:Georgia,serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
    padding:20px;
}

.page{
    display:none;
    width:100%;
    max-width:650px;
    background:rgba(255,255,255,.92);
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.page.active{
    display:block;
}

h1,h2{
    color:#d63384;
    margin-bottom:15px;
}

p{
    color:#444;
    line-height:1.8;
    font-size:18px;
}

button{
    margin-top:20px;
    padding:13px 25px;
    border:none;
    border-radius:30px;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#yes{
    background:#ff4d94;
    color:white;
}

#no{
    background:#ececec;
}

.next{
    background:#ff7eb3;
    color:white;
}

img{
    width:100%;
    max-width:420px;
    border-radius:20px;
    margin:20px auto;
    display:block;
}

.heart{
    position:fixed;
    font-size:30px;
    animation:fly 3s linear forwards;
    pointer-events:none;
}

@keyframes fly{
    to{
        transform:translateY(-500px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="p1" class="page active">

<h1>for my rio 💗</h1>

<p id="typing"></p>

<button class="next" onclick="show(2)">
click here!!
</button>

</div>

<div id="p2" class="page">

<p>
hey rio, no matter how much or how often people hurt each other 
<br><br>
loving someone is never a waste.
<br><br>

<b style="color:#ff4d94;">
can i be your valentine?
</b>

</p>

<button id="yes">yep my dear ❤️</button>
<button id="no">nah loser 👎</button>

<div id="after" style="display:none">

<h2>NOT A LOT, JUST FOREVER !!</h2>

<button class="next" onclick="show(3)">
one more thing,,
</button>

</div>

</div>

<div id="p3" class="page">

<h1>me and my rio against the worlds!!</h1>

<img src="Screenshot_20260720_025536_Gallery.jpg" alt="Photo 1">

<h2>us in every universe 💚</h2>

<img src="Screenshot_20260720_024420_Google.jpg" alt="Photo 2">

</div>

<script>

const text="'summer is almost over, i was in love with her, more than she knew, more than even i knew'";

let i = 0;

function type(){
    if(i < text.length){
        document.getElementById("typing").textContent += text.charAt(i);
        i++;
        setTimeout(type,45);
    }
}

type();

function show(n){
    document.querySelectorAll(".page").forEach(page=>{
        page.classList.remove("active");
    });

    document.getElementById("p"+n).classList.add("active");
}

const no=document.getElementById("no");

function move(){

    const maxX=window.innerWidth-140;
    const maxY=window.innerHeight-70;

    no.style.position="fixed";
    no.style.left=Math.random()*maxX+"px";
    no.style.top=Math.random()*maxY+"px";
}

no.addEventListener("mouseover",move);

no.addEventListener("click",function(e){
    e.preventDefault();
    move();
});

no.addEventListener("touchstart",function(e){
    e.preventDefault();
    move();
},{passive:false});

document.getElementById("yes").onclick=function(){

    document.getElementById("yes").style.display="none";
    no.style.display="none";
    document.getElementById("after").style.display="block";

    for(let j=0;j<45;j++){

        setTimeout(function(){

            let heart=document.createElement("div");

            heart.className="heart";
            heart.innerHTML="❤️";

            heart.style.left=Math.random()*window.innerWidth+"px";
            heart.style.top=(window.innerHeight-20)+"px";

            document.body.appendChild(heart);

            setTimeout(()=>{
                heart.remove();
            },3000);

        },j*70);

    }

};

</script>

</body>
</html>
