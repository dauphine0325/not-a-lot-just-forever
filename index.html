<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ♡</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Georgia",serif;
}


body{

height:100vh;
overflow:hidden;

background:
linear-gradient(135deg,#faf1eb,#f4dfe4);

display:flex;
align-items:center;
justify-content:center;

color:#4b3940;

}



/* arka plan */

.bg{

position:absolute;
width:100%;
height:100%;
overflow:hidden;

}


.dot{

position:absolute;

width:5px;
height:5px;

background:#c58b98;

border-radius:50%;

opacity:.5;

animation:float 8s infinite linear;

}


@keyframes float{

from{
transform:translateY(100vh);
}

to{
transform:translateY(-10vh);
}

}




/* sayfalar */


.page{

position:absolute;

width:90%;
max-width:650px;

text-align:center;

padding:40px;

background:rgba(255,255,255,.55);

backdrop-filter:blur(15px);

border-radius:30px;

box-shadow:
0 20px 50px rgba(120,70,80,.15);


opacity:0;

pointer-events:none;

transform:translateY(30px);

transition:.8s;


}


.page.active{

opacity:1;

pointer-events:auto;

transform:translateY(0);

}




/* plak */


.record{

width:190px;
height:190px;

margin:auto;


border-radius:50%;


background:

radial-gradient(circle,
#d59aaa 0 10%,
#3d3337 11% 30%,
#211d20 31% 60%,
#080808 61%);


animation:spin 10s linear infinite;


box-shadow:
0 15px 30px rgba(0,0,0,.25);

}


.record:after{

content:"";

display:block;

width:35px;
height:35px;

background:#f7dce2;

border-radius:50%;

position:relative;

top:77px;
left:77px;

}



@keyframes spin{

to{
transform:rotate(360deg);
}

}



h1{

margin-top:25px;

font-size:42px;

letter-spacing:8px;

color:#a8566b;

}



.text{

margin:30px 0;

font-size:20px;

line-height:1.8;

min-height:100px;

}




button{

border:none;

padding:15px 35px;

border-radius:40px;

font-size:17px;

cursor:pointer;

transition:.3s;

}



.next{

background:#b9687d;

color:white;

}



.next:hover{

transform:translateY(-5px);

}




/* mektup */


.letter{

background:#fffaf0;

padding:35px;

border-radius:10px;

box-shadow:
0 15px 40px rgba(0,0,0,.15);

transform:rotate(-2deg);

}



.letter p{

font-size:21px;

line-height:1.9;

}



.question{

font-size:32px;

margin:30px;

color:#a8566b;

}



.buttons{

display:flex;

justify-content:center;

gap:25px;

}



#yes{

background:#b9687d;

color:white;

}


#no{

background:#eee0dc;

color:#604850;

}



#result{

display:none;

margin-top:30px;

font-size:28px;

color:#a8566b;

}



.heart{

position:absolute;

font-size:35px;

animation:heart 3s forwards;

}



@keyframes heart{

0%{

transform:translateY(0) scale(.5);

opacity:1;

}


100%{

transform:translateY(-300px) scale(1.5);

opacity:0;

}

}



@media(max-width:600px){

.buttons{

flex-direction:column;

}

}

</style>


</head>


<body>


<div class="bg"></div>



<!-- SAYFA 1 -->


<div class="page active" id="page1">


<div class="record"></div>


<h1>NANA ♡</h1>


<div class="text" id="typing"></div>


<button class="next" onclick="openPage()">

Devam et ♡

</button>


</div>





<!-- SAYFA 2 -->


<div class="page" id="page2">


<div class="letter">


<p>

Sana söylemek istediğim küçük bir şey var...

<br><br>

Bazı insanlar hayatımıza sessizce girer.

Ama bazıları bir şarkı gibi kalır.

<br><br>

Seninle daha fazla anı biriktirmek,

daha fazla gülmek ve yeni hikayeler yazmak istiyorum.

</p>


<div class="question">

Benimle çıkar mısın? ♡

</div>



<div class="buttons">


<button id="yes">

Evet ♡

</button>


<button id="no">

Biraz naz yapayım 🙈

</button>


</div>


<div id="result">

Bundan sonra hikâyemiz başlıyor ♡

</div>



</div>


</div>





<script>


/* sayfa 1 yazı */


const msg=
"Her hikâyenin bir başlangıcı vardır... Belki bizimki de küçük bir soruyla başlayabilir.";

let i=0;


function type(){

if(i<msg.length){

typing.innerHTML+=msg[i];

i++;

setTimeout(type,55);

}

}


type();





/* geçiş */


function openPage(){

page1.classList.remove("active");

setTimeout(()=>{

page2.classList.add("active");

},300);

}




/* arka plan */


for(let i=0;i<50;i++){

let d=document.createElement("div");

d.className="dot";

d.style.left=Math.random()*100+"%";

d.style.animationDelay=Math.random()*8+"s";

d.style.animationDuration=5+Math.random()*8+"s";


document.querySelector(".bg").appendChild(d);

}




/* hayır kaçsın */


no.onmouseover=()=>{

no.style.position="absolute";

no.style.left=Math.random()*70+"vw";

no.style.top=Math.random()*70+"vh";

};





/* evet */


yes.onclick=()=>{


document.querySelector(".buttons").style.display="none";

result.style.display="block";


for(let i=0;i<50;i++){

setTimeout(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="♡";

h.style.left=Math.random()*100+"vw";

h.style.top="80vh";


document.body.appendChild(h);


setTimeout(()=>h.remove(),3000);


},i*60);


}


};


</script>


</body>
</html>
