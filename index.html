<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Rio ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ffe6f2,#ffd6e7);
    font-family:Georgia,serif;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    position:relative;
}

/* Stars */

.star{
    position:fixed;
    color:white;
    font-size:12px;
    opacity:.5;
    animation:twinkle 2s infinite alternate;
    pointer-events:none;
}

@keyframes twinkle{
    from{
        opacity:.2;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1.3);
    }
}

/* Pages */

.page{
    display:none;
    width:100%;
    max-width:650px;
    background:rgba(255,255,255,.93);
    border-radius:22px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 35px rgba(0,0,0,.15);
}

.active{
    display:block;
}

h1,h2{
    color:#d63384;
    margin-bottom:15px;
}

p{
    line-height:1.8;
    color:#444;
    font-size:18px;
}

/* Buttons */

button{
    margin-top:20px;
    padding:12px 24px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    transition:.25s;
}

button:hover{
    transform:scale(1.05);
}

.next,
#yes,
#restart{
    background:#ff5fa2;
    color:white;
}

#no{
    background:#ddd;
}

/* Images */

img{
    width:100%;
    border-radius:18px;
    margin:18px 0;
}

/* Hearts */

.heart{
    position:fixed;
    font-size:28px;
    animation:fly 3s linear forwards;
    pointer-events:none;
}

@keyframes fly{
    to{
        transform:translateY(-600px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="p1" class="page active">

<h1>for my rio 💗</h1>

<p id="typing"></p>

<button class="next" onclick="show(2)">
click here!!
</button>

</div>

<div id="p2" class="page">

<p>

hey rio,

<br><br>

no matter how much or how often people hurt each other,

<br><br>

loving someone is never a waste.

<br><br>

<b style="color:#ff4d94">
can i be your valentine?
</b>

</p>

<button id="yes">
yep my dear ❤️
</button>

<button id="no">
nah loser 👎
</button>

<div id="after" style="display:none">

<h2>NOT A LOT, JUST FOREVER !!</h2>

<button class="next" onclick="show(3)">
one more thing...
</button>

</div>

</div>

<div id="p3" class="page">

<h1>me and my rio against the world!!</h1>

<img src="Screenshot_20260720_025536_Gallery.jpg">

<h2>us in every universe 💚</h2>

<img src="Screenshot_20260720_024420_Google.jpg">

<button id="restart" onclick="show(1)">
start again 💚💙
</button>

</div>

<script>

// stars

for(let i=0;i<70;i++){

let s=document.createElement("div");

s.className="star";

s.innerHTML="✦";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(s);

}

// typing

const text="summer is almost over, i was in love with her, more than she knew, more than even i knew.";

let index=0;

function type(){

if(index<text.length){

typing.textContent+=text[index];

index++;

setTimeout(type,45);

}

}

type();

// pages

function show(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

document.getElementById("p"+page).classList.add("active");

if(page===1){

typing.textContent="";

index=0;

type();

}

}

// No button

function moveButton(){

no.style.position="fixed";

no.style.left=Math.random()*(window.innerWidth-120)+"px";

no.style.top=Math.random()*(window.innerHeight-60)+"px";

}

no.onmouseover=moveButton;

no.onclick=(e)=>{

e.preventDefault();

moveButton();

};

// Yes button

yes.onclick=function(){

yes.style.display="none";

no.style.display="none";

after.style.display="block";

for(let i=0;i<40;i++){

setTimeout(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*window.innerWidth+"px";

h.style.top=window.innerHeight+"px";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},3000);

},i*70);

}

}

</script>

</body>
  </html>
