<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ♡</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Georgia",serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#3b3035;
    background:
    linear-gradient(135deg,#f8eee9,#f5dfe3,#faf7f2);
}


/* küçük ışık efektleri */

.glow{
    position:absolute;
    width:400px;
    height:400px;
    background:#e8a7b5;
    filter:blur(100px);
    opacity:.35;
}


/* yıldızlar */

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:#b98b94;
    border-radius:50%;
    animation:shine 4s infinite;
}

@keyframes shine{
    50%{
        opacity:.2;
    }
}



/* ana kutu */

.container{

    width:90%;
    max-width:650px;
    text-align:center;
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:25px;
    box-shadow:
    0 20px 50px rgba(100,50,60,.15);

}



/* plak */

.record{

    width:180px;
    height:180px;
    margin:auto;

    border-radius:50%;

    background:
    radial-gradient(circle,
    #c47b8b 0 10%,
    #3c3035 11% 30%,
    #54434a 31% 50%,
    #211b1e 51%);

    animation:spin 12s linear infinite;

    box-shadow:
    0 10px 30px rgba(0,0,0,.25);

}


.record:after{

    content:"";

    width:35px;
    height:35px;

    background:#f4d8dd;

    border-radius:50%;

    position:absolute;

}



@keyframes spin{

    to{
        transform:rotate(360deg);
    }

}



h1{

    margin-top:25px;

    letter-spacing:8px;

    color:#9d4d62;

    font-size:42px;

}



#text{

    margin:30px auto;

    font-size:20px;

    line-height:1.8;

    min-height:100px;

}



/* BUTONLAR */

.buttons{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:25px;

    margin-top:30px;

    position:relative;

}



button{

    position:relative !important;

    padding:15px 35px;

    border:none;

    border-radius:40px;

    cursor:pointer;

    font-size:17px;

    transition:.3s;

}



#yes{

    background:#b95f75;

    color:white;

}


#yes:hover{

    transform:translateY(-5px);

    background:#a64b62;

}



#no{

    background:#eee1dc;

    color:#6b4c55;

}



#no:hover{

    transform:translateY(-5px);

}



#result{

    display:none;

    margin-top:35px;

    font-size:28px;

    color:#a64b62;

}



.heart{

    position:absolute;

    animation:heart 3s forwards;

}



@keyframes heart{

    from{

        opacity:1;

        transform:translateY(0) scale(.5);

    }

    to{

        opacity:0;

        transform:translateY(-300px) scale(1.5);

    }

}


@media(max-width:600px){

.buttons{

    flex-direction:column;

}

button{

    width:200px;

}

}

</style>

</head>


<body>


<div class="glow"></div>


<div class="container">


<div class="record"></div>


<h1>'summer is almost over, i was in love with her, more then she knew, more then even i knew'</h1>


<div id="text"></div>


<div class="buttons">

<button id="yes">
Evet hayatım❤️
</button>

<button id="no">
Hayır ezik👎
</button>

</div>


<div id="result">

ne kadar uzaksak, o kadar yakınız 

</div>


</div>



<script>


const message=
"Sana aşık olmamak zor, tüm kalbimi sana açtım. Sevgilin olabilir miyim?";


let i=0;

function type(){

if(i<message.length){

document.getElementById("text").innerHTML+=message[i];

i++;

setTimeout(type,45);

}

}

type();



/* yıldızlar */

for(let i=0;i<70;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(s);

}



/* hayır kaçışı */

const no=document.getElementById("no");


no.onmouseover=()=>{

no.style.position="absolute";

no.style.left=Math.random()*70+"vw";

no.style.top=Math.random()*70+"vh";

};



/* evet */

document.getElementById("yes").onclick=()=>{


document.querySelector(".buttons").style.display="none";

document.getElementById("result").style.display="block";


for(let i=0;i<40;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="♡";

h.style.left=Math.random()*100+"vw";

h.style.top="80vh";

document.body.appendChild(h);


setTimeout(()=>h.remove(),3000);


}


};



</script>


</body>
</html>
