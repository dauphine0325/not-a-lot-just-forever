<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,serif;
}

body{
overflow:hidden;
background:#050505;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%,rgba(255,0,70,.18),transparent 30%),
radial-gradient(circle at 80% 70%,rgba(255,255,255,.05),transparent 35%);
z-index:-2;
}

.stars{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:fall linear infinite;
opacity:.8;
}

@keyframes fall{

0%{
transform:translateY(-100vh);
opacity:0;
}

30%{
opacity:1;
}

100%{
transform:translateY(100vh);
opacity:0;
}

}

.record{
width:230px;
height:230px;
border-radius:50%;
background:
radial-gradient(circle,#111 25%,#000 26%,#222 28%,#000 35%,#222 40%,#000 48%,#222 55%,#000 63%);
display:flex;
justify-content:center;
align-items:center;
animation:spin 8s linear infinite;
box-shadow:0 0 40px rgba(255,0,80,.25);
margin:auto;
}

.record::after{
content:"";
width:40px;
height:40px;
background:#b30030;
border-radius:50%;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

.container{
text-align:center;
width:90%;
max-width:700px;
z-index:2;
}

h1{
margin-top:40px;
font-size:45px;
letter-spacing:4px;
color:#ff305f;
}

#text{
margin:30px auto;
font-size:22px;
max-width:650px;
min-height:90px;
line-height:1.7;
color:#eee;
}

.buttons{
margin-top:40px;
position:relative;
height:90px;
}

button{
padding:16px 34px;
font-size:18px;
border:none;
cursor:pointer;
border-radius:50px;
transition:.3s;
position:absolute;
}

#yes{
left:25%;
background:#d00040;
color:white;
}

#yes:hover{
transform:scale(1.08);
background:#ff2d68;
}

#no{
right:25%;
background:white;
color:black;
}

#result{
font-size:32px;
margin-top:40px;
color:#ff4d79;
display:none;
animation:fade 1s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.petal{
position:absolute;
top:-30px;
font-size:18px;
color:#ff4065;
animation:petal linear infinite;
opacity:.9;
}

@keyframes petal{

0%{
transform:translateY(-20px) rotate(0);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}

.heart{
position:absolute;
font-size:30px;
animation:float 4s linear forwards;
}

@keyframes float{

0%{
opacity:1;
transform:translateY(0) scale(.5);
}

100%{
opacity:0;
transform:translateY(-250px) scale(1.8);
}

}
</style>

</head>
<body>

<div class="stars"></div>

<div class="container">

<div class="record"></div>

<h1>Heynana</h1>

<div id="text"></div>

<div class="buttons">

<button id="yes">Evet ❤️</button>

<button id="no">Hayır 🙈</button>

</div>

<div id="result">
❤️ Bundan sonra hikayemizi birlikte yazalım.
</div>

</div>

<script>

const message=
"Hayat bazen en güzel şarkıyı hiç beklemediğin anda çalar... Belki bu da bizim şarkımızdır. Benimle çıkar mısın?";

let i=0;

function type(){

if(i<message.length){

text.innerHTML+=message.charAt(i);

i++;

setTimeout(type,45);

}

}

type();

const stars=document.querySelector(".stars");

for(let i=0;i<140;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"%";

s.style.animationDuration=3+Math.random()*6+"s";

s.style.animationDelay=Math.random()*5+"s";

stars.appendChild(s);

}

for(let i=0;i<25;i++){

let p=document.createElement("div");

p.className="petal";

p.innerHTML="❀";

p.style.left=Math.random()*100+"%";

p.style.animationDuration=6+Math.random()*8+"s";

p.style.animationDelay=Math.random()*6+"s";

document.body.appendChild(p);

}

const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{

const x=Math.random()*(window.innerWidth-120);

const y=Math.random()*(window.innerHeight-80);

no.style.left=x+"px";

no.style.top=y+"px";

});

document.getElementById("yes").onclick=()=>{

document.querySelector(".buttons").style.display="none";

document.getElementById("result").style.display="block";

for(let i=0;i<70;i++){

setTimeout(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.top="80vh";

document.body.appendChild(h);

setTimeout(()=>h.remove(),4000);

},i*70);

}

};

</script>

</body>
</html>
