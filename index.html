from pathlib import Path
html="""<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>For Rio</title>
<style>
body{margin:0;font-family:Georgia;background:#f8e8ec;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}

<div id=p1 class="page active">

</div></div>

</div>

<script>
const txt="'summer is almost over, i was in love with her, more than she knew, more than even i knew'";
let i=0;function type(){if(i<txt.length){typing.textContent+=txt[i++];setTimeout(type,45)}}type();
